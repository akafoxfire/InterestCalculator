<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interest Calculator (Updated)</title>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:20px auto;padding:20px}
input,select,button{padding:8px;margin:4px;width:100%}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #ccc;padding:8px}
</style>
</head>
<body>
<h2>Interest Calculator (Updated)</h2>

<div class="grid">
<div><label>Name</label><input id="name"></div>
<div><label>Principal</label><input id="principal" type="number"></div>
<div><label>Rate %</label><input id="rate" type="number" step="0.01"></div>
<div><label>Type</label>
<select id="type">
<option value="si">Simple Interest</option>
<option value="ci">Compound Interest</option>
</select></div>
<div><label>Start Date</label><input id="start" type="date"></div>
<div><label>End Date</label><input id="end" type="date"></div>
<div><label>Compounding</label>
<select id="freq">
<option value="1">Annual</option>
<option value="2">Semi Annual</option>
<option value="4">Quarterly</option>
<option value="12">Monthly</option>
<option value="365">Daily</option>
</select></div>
</div>

<button onclick="calc()">Calculate</button>

<h3 id="summary"></h3>
<table>
<thead><tr><th>Period</th><th>Interest</th><th>Balance</th></tr></thead>
<tbody id="tb"></tbody>
</table>

<script>
function fmt(x){return x.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}

function daysBetween(a,b){
 return Math.floor((b-a)/(1000*60*60*24));
}

function calc(){
 let P=parseFloat(principal.value);
 let R=parseFloat(rate.value);
 if(isNaN(P)||P<=0){alert("Invalid principal");return;}
 if(isNaN(R)||R<0){alert("Invalid rate");return;}

 let s=new Date(start.value);
 let e=new Date(end.value);
 if(!(s<e)){alert("Invalid dates");return;}

 let days=daysBetween(s,e);
 let tbody=document.getElementById("tb");
 tbody.innerHTML="";

 if(type.value==="si"){
   let I=P*R*days/36500;
   let A=P+I;
   summary.textContent=`SI Interest ₹${fmt(I)} | Final Amount ₹${fmt(A)} | ${days} days`;
   tbody.innerHTML=`<tr><td>${days} Days</td><td>₹${fmt(I)}</td><td>₹${fmt(A)}</td></tr>`;
 }else{
   let n=parseInt(freq.value);
   let t=days/365.2425;
   let balance=P;
   let periodYears=1/n;
   let totalPeriods=Math.floor(t*n);

   for(let i=1;i<=totalPeriods;i++){
      let newBal=balance*(1+R/(100*n));
      let interest=newBal-balance;
      balance=newBal;

      let label=(n==1)?`Year ${i}`:
                (n==2)?`Half-Year ${i}`:
                (n==4)?`Quarter ${i}`:
                (n==12)?`Month ${i}`:
                `Period ${i}`;

      tbody.innerHTML+=`<tr><td>${label}</td><td>₹${fmt(interest)}</td><td>₹${fmt(balance)}</td></tr>`;
   }

   let remaining=t-totalPeriods/n;
   if(remaining>0){
      let newBal=balance*Math.pow(1+R/(100*n),n*remaining);
      let interest=newBal-balance;
      balance=newBal;
      tbody.innerHTML+=`<tr><td>Remaining Fraction</td><td>₹${fmt(interest)}</td><td>₹${fmt(balance)}</td></tr>`;
   }

   let A=P*Math.pow(1+R/(100*n),n*t);
   let I=A-P;
   summary.textContent=`CI Interest ₹${fmt(I)} | Final Amount ₹${fmt(A)} | ${days} days`;
 }
}
</script>
</body>
</html>
